version: '3.8'

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - 9092:9092
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=kafka-buffer-demo-cluster-001

  tempo:
    image: grafana/tempo:${GRAFANA_TEMPO_VERSION:-2.10.1}
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - 3200:3200
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml

  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.14.0}
    ports:
      - 8888:8888
      - 4317:4317
      - 4318:4318
      - 12345:12345     # Alloy UI
    volumes:
      - ./config-otel.yaml:/etc/alloy/config-otel.yaml
      - ./config.alloy:/etc/alloy/config.alloy
    command: otel --config=/etc/alloy/config-otel.yaml
    depends_on:
      - kafka
      - tempo

  demo-app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.11-slim}
    ports:
      - 8080:8080
    depends_on:
      - alloy

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.4.0}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    depends_on:
      - tempo
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Tempo
          type: tempo
          access: proxy
          orgId: 1
          url: http://tempo:3200
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
