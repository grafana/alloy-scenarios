version: '3.8'

services:
  # Loki for log storage
  loki:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.7}
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - 3100:3100/tcp
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml

  # Prometheus for metrics storage (receives derived count metrics via OTLP)
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.10.0}
    command:
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090/tcp
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml

  # Tempo for trace storage
  tempo:
    image: grafana/tempo:${GRAFANA_TEMPO_VERSION:-2.10.1}
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - 3200:3200/tcp
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml

  # Grafana for visualization
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.4.0}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
        - name: Tempo
          type: tempo
          access: proxy
          orgId: 1
          url: http://tempo:3200
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
          jsonData:
            serviceMap:
              datasourceUid: 'Prometheus'
            nodeGraph:
              enabled: true
        EOF
        /run.sh
    depends_on:
      - loki
      - prometheus
      - tempo

  # Alloy in OTel engine mode
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.14.0}
    command: otel --config=/etc/alloy/config-otel.yaml
    ports:
      - 8888:8888       # OTel engine HTTP server
      - 4317:4317       # OTLP gRPC
      - 4318:4318       # OTLP HTTP
    volumes:
      - ./config-otel.yaml:/etc/alloy/config-otel.yaml
    depends_on:
      - loki
      - prometheus
      - tempo

  # Demo app that generates traces and logs for count connector
  demo-app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION:-3.11-slim}
    ports:
      - 8080:8080
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_SERVICE_NAME=count-connector-demo
    depends_on:
      - alloy
