version: '3.8'

services:
  loki:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.7}
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.14.0}
    ports:
      - 8888:8888
      - 4317:4317/tcp
      - 4318:4318/tcp
    volumes:
      - ./config-otel.yaml:/etc/alloy/config-otel.yaml
    command: otel --config=/etc/alloy/config-otel.yaml
    depends_on:
      - loki

  log-generator:
    image: python:${PYTHON_VERSION:-3.11-slim}
    volumes:
      - ./app/generate_logs.py:/app/generate_logs.py
      - ./app/requirements.txt:/app/requirements.txt
    command:
      - sh
      - -c
      - "pip install -r /app/requirements.txt && python /app/generate_logs.py"
    depends_on:
      - alloy

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.4.0}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    depends_on:
      - loki
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki (team-a)
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: team-a
        - name: Loki (team-b)
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: team-b
        EOF
        /run.sh
