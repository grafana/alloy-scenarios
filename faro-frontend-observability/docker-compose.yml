services:
  # Nginx web server serving the demo frontend page
  web:
    image: nginx:latest@sha256:6e23479198b998e5e25921dff8455837c7636a67111a04a635cf1bb363d199dc
    ports:
      - 8080:80
    volumes:
      - ./app:/usr/share/nginx/html:ro

  # Alloy telemetry pipeline — receives Faro Web SDK telemetry and forwards logs to Loki
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.0}
    ports:
      - 12345:12345
      - 12347:12347
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data --stability.level=experimental /etc/alloy/config.alloy
    depends_on:
      - loki

  # Loki for log aggregation
  loki:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.10}
    ports:
      - 3100:3100/tcp
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana for visualization
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    depends_on:
      - loki
