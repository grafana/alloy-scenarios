services:

  loki:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.10}
    ports:
      - "3100:3100/tcp"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - "3000:3000/tcp"
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh

  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.0}
    ports:
      - "12345:12345"
      - "9999:9999"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki

  firehose-sender:
    image: python:${PYTHON_VERSION:-3.11-slim}
    volumes:
      - ./firehose_sender.py:/firehose_sender.py:ro
    environment:
      - ALLOY_FIREHOSE_URL=http://alloy:9999/awsfirehose/api/v1/push
      - INTERVAL_SECONDS=5
      - EVENTS_PER_BATCH=8
    depends_on:
      - alloy
    command: ["python3", "-u", "/firehose_sender.py"]
    restart: unless-stopped
