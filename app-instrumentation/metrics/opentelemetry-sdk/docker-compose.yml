services:
  # ── Online-store services, each instrumented with its language's OTel SDK ──
  # service.name is set via OTEL_SERVICE_NAME; language is carried as a resource
  # attribute. Python/Go/Java/C# push over gRPC (4317); Node.js pushes over
  # HTTP/protobuf (4318).
  python:
    build: ./python
    environment:
      - OTEL_SERVICE_NAME=checkout
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=onlinestore,service.version=1.0.0,deployment.environment=demo,language=python
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=5000
    restart: unless-stopped
    depends_on:
      - alloy

  node:
    build: ./node
    environment:
      - OTEL_SERVICE_NAME=catalog
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=onlinestore,service.version=1.0.0,deployment.environment=demo,language=javascript
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_METRIC_EXPORT_INTERVAL=5000
    restart: unless-stopped
    depends_on:
      - alloy

  go:
    build: ./go
    environment:
      - OTEL_SERVICE_NAME=inventory
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=onlinestore,service.version=1.0.0,deployment.environment=demo,language=go
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=5000
    restart: unless-stopped
    depends_on:
      - alloy

  java:
    build: ./java
    environment:
      - OTEL_SERVICE_NAME=orders
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=onlinestore,service.version=1.0.0,deployment.environment=demo,language=java
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=5000
    restart: unless-stopped
    depends_on:
      - alloy

  csharp:
    build: ./csharp
    environment:
      - OTEL_SERVICE_NAME=shipping
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=onlinestore,service.version=1.0.0,deployment.environment=demo,language=csharp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_METRIC_EXPORT_INTERVAL=5000
    restart: unless-stopped
    depends_on:
      - alloy

  # ── Telemetry pipeline ──
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.17.1}
    ports:
      - 12345:12345  # Alloy UI
      - 4317:4317    # OTLP gRPC
      - 4318:4318    # OTLP HTTP
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - prometheus

  # ── Storage ──
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.13.1}
    command:
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver  # required: Alloy posts to /api/v1/otlp
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml

  # ── Visualization ──
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.1.0}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-metricsdrilldown-app
    ports:
      - 3000:3000
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    depends_on:
      - prometheus

networks:
  default:
    name: metrics-otel-network
