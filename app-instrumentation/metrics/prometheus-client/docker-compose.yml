services:
  # ── Online-store services, each exposing /metrics via its language's native
  # Prometheus client library on port 9100. Alloy scrapes them by service name.
  python:
    build: ./python
    restart: unless-stopped

  node:
    build: ./node
    restart: unless-stopped

  go:
    build: ./go
    restart: unless-stopped

  java:
    build: ./java
    restart: unless-stopped

  csharp:
    build: ./csharp
    restart: unless-stopped

  # ── Telemetry pipeline ──
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.1}
    ports:
      - 12345:12345  # Alloy UI
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - prometheus

  # ── Storage ──
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.11.3}
    command:
      - --web.enable-remote-write-receiver  # required: Alloy remote-writes here
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml

  # ── Visualization ──
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-metricsdrilldown-app
    ports:
      - 3000:3000
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    depends_on:
      - prometheus

networks:
  default:
    name: metrics-prometheus-network
