
services:
  # Python Flask app that generates traces
  app:
    image: python:${PYTHON_VERSION:-3.11-slim}
    ports:
      - 5000:5000/tcp
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python main.py"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
    depends_on:
      - alloy

  # Load generator to continuously hit the app endpoints
  load:
    image: python:${PYTHON_VERSION:-3.11-slim}
    volumes:
      - ./app:/app
    working_dir: /app
    command: sh -c "pip install requests && python load.py"
    depends_on:
      - app

  # Alloy for telemetry pipeline with spanmetrics connector
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.17.0}
    ports:
      - 12345:12345      # Alloy HTTP server
      - 4317:4317        # OTLP gRPC
      - 4318:4318        # OTLP HTTP
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - prometheus
      - tempo

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.11.3}
    command:
      - --web.enable-remote-write-receiver
      - --web.enable-otlp-receiver
      - --enable-feature=native-histograms
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090/tcp
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml

  # Tempo for trace storage
  tempo:
    image: grafana/tempo:${GRAFANA_TEMPO_VERSION:-2.10.4}
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - 3200:3200/tcp
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    depends_on:
      - memcached

  memcached:
    image: memcached:1.6@sha256:26983a43c9181d37d0f9b0d2cf49c3ccf02e5b816afb1f8ffff7f825e65bcdad
    container_name: memcached
    ports:
      - "11211:11211"
    environment:
      - MEMCACHED_MAX_MEMORY=64m
      - MEMCACHED_THREADS=4

  # Grafana for visualization
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.2}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        - name: Tempo
          type: tempo
          access: proxy
          orgId: 1
          url: http://tempo:3200
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
          jsonData:
            serviceMap:
              datasourceUid: 'Prometheus'
            nodeGraph:
              enabled: true
        EOF
        /run.sh
    depends_on:
      - prometheus
      - tempo

volumes:
  tempo-data:
