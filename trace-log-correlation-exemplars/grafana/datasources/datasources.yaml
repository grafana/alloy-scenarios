apiVersion: 1
datasources:
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    orgId: 1
    url: http://tempo:3200
    basicAuth: false
    isDefault: false
    version: 1
    editable: false

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      # The wiring that makes exemplar dots clickable: when a panel shows
      # an exemplar whose label key is trace_id, Grafana renders a
      # "Query with Tempo" link that opens that exact trace. The name must
      # match the exemplar label the app emits.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
