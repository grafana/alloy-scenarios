# net-snmp agent configuration for the Alloy SNMP demo.
#
# Listens on UDP/161 and answers SNMPv2c queries using the read-only
# community "public". This is intentionally wide open because it only
# runs inside the compose network as a throwaway demo target — never
# expose an agent configured like this on a real network.

agentaddress udp:0.0.0.0:161

# rocommunity <community> <source> <oid>
#   community = public, source = default (any), oid = .1 (whole tree).
# Granting the entire .1 subtree lets the exporter walk the standard
# MIB-II interfaces table out of the box.
rocommunity public default .1

# Friendly system identification surfaced via the SNMPv2-MIB.
sysLocation  Grafana Alloy SNMP demo
sysContact   alloy@example.com
sysName      alloy-snmp-demo
