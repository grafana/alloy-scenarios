# snmp_exporter configuration consumed by Alloy's prometheus.exporter.snmp
# component (the config_file argument in config.alloy).
#
# It defines one auth profile (SNMPv2c, community "public") and one module
# that walks the standard MIB-II interfaces group (IF-MIB), which every
# net-snmp agent answers out of the box — so the demo works without any
# vendor-specific MIBs.

auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  if_mib:
    # 1.3.6.1.2.1.2 = the "interfaces" group: ifNumber (scalar) + ifTable.
    walk:
      - 1.3.6.1.2.1.2
    metrics:
      - name: ifNumber
        oid: 1.3.6.1.2.1.2.1
        type: gauge
        help: The number of network interfaces on the system - 1.3.6.1.2.1.2.1
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: The current operational state of the interface - 1.3.6.1.2.1.2.2.1.8
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: The total number of octets received on the interface - 1.3.6.1.2.1.2.2.1.10
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: The total number of octets transmitted out of the interface - 1.3.6.1.2.1.2.2.1.16
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
