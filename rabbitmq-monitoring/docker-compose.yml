services:
  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION:-4.3.0-management}
    container_name: rabbitmq-monitoring-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - ./enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  loadgen:
    image: pivotalrabbitmq/perf-test:${RABBITMQ_PERF_TEST_VERSION:-2.24.0}
    container_name: rabbitmq-monitoring-loadgen
    command:
      - --uri
      - amqp://guest:guest@rabbitmq:5672
      - --queue
      - alloy-sample
      - --producers
      - "1"
      - --consumers
      - "0"
      - --rate
      - "1"
      - --size
      - "256"
      - --flag
      - persistent
      - --id
      - alloy-rabbitmq-demo
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.0}
    container_name: rabbitmq-monitoring-alloy
    ports:
      - "12345:12345"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      rabbitmq:
        condition: service_healthy
      loki:
        condition: service_started
      prometheus:
        condition: service_started

  loki:
    image: grafana/loki:${GRAFANA_LOKI_VERSION:-3.6.10}
    container_name: rabbitmq-monitoring-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.11.2}
    container_name: rabbitmq-monitoring-prometheus
    command:
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    container_name: rabbitmq-monitoring-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - "3000:3000/tcp"
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Loki
          type: loki
          access: proxy
          orgId: 1
          url: http://loki:3100
          basicAuth: false
          isDefault: false
          version: 1
          editable: false
        - name: Prometheus
          type: prometheus
          access: proxy
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
