#
# OTel Collector YAML Configuration for Game of Tracing
#
# This is the OTel-native equivalent of config.alloy for use with the Alloy OTel Engine.
# Run with: docker compose -f docker-compose.yml -f docker-compose-otel.yml up -d
#

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/logs:
    endpoint: http://loki:3100/otlp

  otlphttp/metrics:
    endpoint: http://prometheus:9090/api/v1/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logs]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/metrics]
