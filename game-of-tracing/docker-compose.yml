      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      southern-capital:
        condition: service_healthy
      northern-capital:
        condition: service_healthy
      village-1:
        condition: service_healthy
      village-2:
        condition: service_healthy
      village-3:
        condition: service_healthy
      village-4:
