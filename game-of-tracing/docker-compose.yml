    environment:
      - LOCATION_ID=village_2
      - FLASK_APP=location_server.py
      - LOCATION_NAME=village-2
      - DATABASE_FILE=/data/game_state.db
      - PYROSCOPE_SERVER_ADDRESS=http://alloy:9999
    volumes:
      - game-data:/data
