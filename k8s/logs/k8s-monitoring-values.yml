---
cluster:
  name: meta-monitoring-tutorial

destinations:
  loki:
    type: loki
    url: http://loki-gateway.meta.svc.cluster.local/loki/api/v1/push

clusterEvents:
  enabled: true
  collector: alloy-singleton
  namespaces:
    - meta
    - prod

podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-logs
  namespaces:
    - meta
    - prod
  structuredMetadata:
    pod: pod

collectors:
  alloy-singleton:
    presets: [singleton]
  alloy-logs:
    presets: [clustered]
