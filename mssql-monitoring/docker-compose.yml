services:
  # SQL Server is amd64-only; the explicit platform lets Apple Silicon hosts
  # run it under emulation instead of failing the pull. The image needs
  # ~2 GB of memory and an EULA acceptance flag to start.
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest@sha256:cee0f4db03b5192de777d37a22455949d1c2c230bb48c0a732b88b0933117a72
    platform: linux/amd64
    hostname: mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Alloy-Demo-Pass123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "Alloy-Demo-Pass123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Creates the demo database and table, then inserts one row per second so
  # the custom query metric (mssql_demo_events_rows) keeps climbing.
  mssql-load:
    image: mcr.microsoft.com/mssql/server:2025-latest@sha256:cee0f4db03b5192de777d37a22455949d1c2c230bb48c0a732b88b0933117a72
    platform: linux/amd64
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped
    entrypoint:
      - bash
      - -c
      - |
        # Idempotent setup: safe to re-run after a container restart.
        /opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P 'Alloy-Demo-Pass123!' \
          -Q "IF DB_ID('demo') IS NULL CREATE DATABASE demo"
        /opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P 'Alloy-Demo-Pass123!' -d demo \
          -Q "IF OBJECT_ID('dbo.events','U') IS NULL CREATE TABLE dbo.events (id INT IDENTITY PRIMARY KEY, at DATETIME2 DEFAULT SYSUTCDATETIME(), value FLOAT)"
        echo "demo schema ready - generating insert load"
        # Insert a row every second. This loop must run for the life of the
        # container: it drives the custom metric AND keeps the container
        # alive (an exit would trip CI's no-exited-containers check).
        while true; do
          /opt/mssql-tools18/bin/sqlcmd -C -S mssql -U sa -P 'Alloy-Demo-Pass123!' -d demo \
            -Q "INSERT INTO dbo.events (value) VALUES (RAND())" >/dev/null
          sleep 1
        done

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.11.3}
    command:
      - --web.enable-remote-write-receiver
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prom-config.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.2}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          orgId: 1
          url: http://prometheus:9090
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh

  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.1}
    ports:
      - 12345:12345
    environment:
      # The connection string carries the SA password, so it lives in the
      # environment rather than in config.alloy. sys.env() coerces it into
      # an Alloy secret, which the UI redacts.
      - "MSSQL_CONNECTION_STRING=sqlserver://sa:Alloy-Demo-Pass123!@mssql:1433?encrypt=true&trustservercertificate=true"
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
      - ./mssql-queries.yaml:/etc/alloy/mssql-queries.yaml
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      mssql:
        condition: service_healthy
