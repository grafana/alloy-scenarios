services:
  postgres:
    image: postgres:18@sha256:f7ce845ee6873dd84be93c9828fe0d1fab0f9707dc9ac569694657398b290bce
    environment:
      POSTGRES_USER: alloy
      POSTGRES_PASSWORD: alloy
      POSTGRES_DB: alloy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alloy"]
      interval: 5s
      timeout: 5s
      retries: 5
