services:
  postgres:
    image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    environment:
      POSTGRES_USER: alloy
      POSTGRES_PASSWORD: alloy
      POSTGRES_DB: alloy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alloy"]
      interval: 5s
      timeout: 5s
      retries: 5
