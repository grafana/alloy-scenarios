services:
  stress-cpu:
    image: golang:1.26@sha256:2981696eed011d747340d7252620932677929cce7d2d539602f56a8d7e9b660b
    container_name: stress-cpu
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . cpu
    restart: unless-stopped

  stress-mem:
    image: golang:1.26@sha256:2981696eed011d747340d7252620932677929cce7d2d539602f56a8d7e9b660b
    container_name: stress-mem
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . mem
    restart: unless-stopped
