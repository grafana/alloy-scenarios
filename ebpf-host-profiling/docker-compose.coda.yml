services:
  stress-cpu:
    image: golang:1.26@sha256:3aff6657219a4d9c14e27fb1d8976c49c29fddb70ba835014f477e1c70636647
    container_name: stress-cpu
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . cpu
    restart: unless-stopped

  stress-mem:
    image: golang:1.26@sha256:3aff6657219a4d9c14e27fb1d8976c49c29fddb70ba835014f477e1c70636647
    container_name: stress-mem
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . mem
    restart: unless-stopped
