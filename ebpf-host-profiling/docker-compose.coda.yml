services:
  stress-cpu:
    image: golang:1.26@sha256:079e59808d2d252516e27e3f3a9c003740dee7f75e55aa71528766d52bcfc16a
    container_name: stress-cpu
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . cpu
    restart: unless-stopped

  stress-mem:
    image: golang:1.26@sha256:079e59808d2d252516e27e3f3a9c003740dee7f75e55aa71528766d52bcfc16a
    container_name: stress-mem
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . mem
    restart: unless-stopped
