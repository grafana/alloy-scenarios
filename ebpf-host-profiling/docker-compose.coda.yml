services:
  stress-cpu:
    image: golang:1.26@sha256:32c0e6e5c4f6707717051091b4d0b077464a679eaab563e11474efc5328e2aa5
    container_name: stress-cpu
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . cpu
    restart: unless-stopped

  stress-mem:
    image: golang:1.26@sha256:32c0e6e5c4f6707717051091b4d0b077464a679eaab563e11474efc5328e2aa5
    container_name: stress-mem
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run . mem
    restart: unless-stopped
