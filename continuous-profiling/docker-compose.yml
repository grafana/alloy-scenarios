
services:
  # Demo Go application with pprof endpoints
  demo-app:
    image: golang:1.26@sha256:2981696eed011d747340d7252620932677929cce7d2d539602f56a8d7e9b660b
    ports:
      - 6060:6060
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run main.go

  # Pyroscope for continuous profiling storage and visualization
  pyroscope:
    image: grafana/pyroscope:2.0.2@sha256:644515bfa06cb3779b8666514b1bab2295bd11f1e1a53834bd9584a43f77c4f5
    ports:
      - 4040:4040

  # Grafana for visualization
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Pyroscope
          type: grafana-pyroscope-datasource
          access: proxy
          orgId: 1
          url: http://pyroscope:4040
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    depends_on:
      - pyroscope

  # Alloy for telemetry pipeline
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.1}
    ports:
      - 12345:12345      # Alloy HTTP server
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - demo-app
      - pyroscope
