
services:
  # Demo Go application with pprof endpoints
  demo-app:
    image: golang:1.26@sha256:b54cbf583d390341599d7bcbc062425c081105cc5ef6d170ced98ef9d047c716
    ports:
      - 6060:6060
    volumes:
      - ./app:/app
    working_dir: /app
    command: go run main.go

  # Pyroscope for continuous profiling storage and visualization
  pyroscope:
    image: grafana/pyroscope:2.0.1@sha256:704889ae04768d982a0a71935bb054948993ddc3fe80234611d20877ba8be4c9
    ports:
      - 4040:4040

  # Grafana for visualization
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-13.0.1}
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - 3000:3000/tcp
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
        - name: Pyroscope
          type: grafana-pyroscope-datasource
          access: proxy
          orgId: 1
          url: http://pyroscope:4040
          basicAuth: false
          isDefault: true
          version: 1
          editable: false
        EOF
        /run.sh
    depends_on:
      - pyroscope

  # Alloy for telemetry pipeline
  alloy:
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.16.0}
    ports:
      - 12345:12345      # Alloy HTTP server
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - demo-app
      - pyroscope
